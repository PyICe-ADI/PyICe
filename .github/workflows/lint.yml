name: Lint

on: [push, pull_request]

permissions:
  contents: read

jobs:
  flake8:
    name: Flake8 / Doctest coverage (Python 3.10)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc pkg-config libcairo2-dev python3-dev libegl1
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        pip install -e ".[dev]"
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Lint with flake8 (advisory)
      run: |
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Check docstring coverage (advisory)
      run: |
        flake8 PyICe/ Tests/ --select=D --count --statistics --exit-zero
    - name: Doctest coverage report (advisory)
      run: |
        python Tests/doctest_coverage.py

  pyright:
    name: "Pyright type check (Py 3.10)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libcairo2-dev python3-dev libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Type check with pyright
        run: |
          pyright

  pylint:
    name: Pylint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.12", "3.x"]
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc pkg-config libcairo2-dev python3-dev libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        pip install -e ".[dev]"
    - name: Analysing the code with pylint
      run: |
        readarray -d '' files < <(git ls-files -z '*.py')
        pylint --fail-under=2.0 --fail-on=F,E --ignore=conf.py "${files[@]}"
